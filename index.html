}
body {
    margin:0; padding:0;
    background-color: var(--dark-bg);
    color: var(--text-white);
    font-family: Arial, sans-serif;
}
header {
    text-align:center;
    padding:20px;
    font-size:2rem;
    font-weight:bold;
    color: var(--neon-red);
    text-shadow: 0 0 5px #fff,0 0 10px var(--neon-red);
}
.wrapper {
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    padding:20px;
}
.video-card {
    background: var(--card-bg);
    margin:15px;
    border-radius:10px;
    overflow:hidden;
    width:300px;
    box-shadow: 0 0 15px var(--neon-red);
    transition: 0.3s;
}
.video-card:hover {
    transform: translateY(-5px);
    box-shadow: 0 0 30px var(--neon-red);
}
.video-frame {
    position:relative;
    padding-bottom:56.25%;
    height:0;
}
.video-frame iframe {
    position:absolute;
    top:0; left:0;
    width:100%; height:100%;
    border:none;
}
.video-title {
    padding:10px;
    font-size:0.9rem;
    text-align:center;
}
.category-badge {
    display:inline-block;
    margin:5px;
    padding:3px 8px;
    background:#222;
    border-radius:5px;
    font-size:0.7rem;

</style>
</head>
<body>

<div class="wrapper" id="video-grid">
