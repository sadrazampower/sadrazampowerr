<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SADRAZAM POWER | Premium</title>
    <style>
        :root {
            --neon-red: #ff0000;
            --dark-red: #330000;
            --bg-black: #050505;
            --card-gray: #111111;
        }

        * { box-sizing: border-box; }

        body {
            background-color: var(--bg-black);
            color: #fff;
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        /* --- LOGO ANİMASYONU --- */
        .logo-container {
            text-align: center;
            padding: 20px;
        }

        .neon-logo {
            font-size: clamp(2rem, 8vw, 4rem);
            font-weight: 900;
            color: #fff;
            text-transform: uppercase;
            text-shadow: 0 0 5px #fff, 0 0 10px #fff, 0 0 20px var(--neon-red), 0 0 40px var(--neon-red), 0 0 80px var(--neon-red);
            animation: flicker 1.5s infinite alternate;
        }

        @keyframes flicker {
            0%, 18%, 22%, 25%, 53%, 57%, 100% {
                text-shadow: 0 0 4px #fff, 0 0 11px #fff, 0 0 19px #fff, 0 0 40px var(--neon-red), 0 0 80px var(--neon-red);
            }
            20%, 24%, 55% { text-shadow: none; }
        }

        /* --- MOBİL UYUMLU LAYOUT --- */
        .main-wrapper {
            display: flex;
            flex-direction: column; /* Mobilde alt alta */
        }

        @media (min-width: 992px) {
            .main-wrapper { flex-direction: row; }
            .sidebar { width: 280px !important; }
        }

        /* KATEGORİLER (SİDEBAR) */
        .sidebar {
            width: 100%;
            background: #0a0a0a;
            border-right: 2px solid var(--dark-red);
            padding: 15px;
            max-height: 400px;
            overflow-y: auto;
        }

        @media (min-width: 992px) {
            .sidebar { height: 100vh; position: sticky; top: 0; max-height: none; }
        }

        .cat-btn {
            display: block;
            width: 100%;
            padding: 12px;
            margin-bottom: 5px;
            background: transparent;
            border: 1px solid #222;
            color: #aaa;
            text-align: left;
            cursor: pointer;
            transition: 0.3s;
        }

        .cat-btn:hover {
            border-color: var(--neon-red);
            color: #fff;
            box-shadow: inset 0 0 10px var(--dark-red);
        }

        /* VİDEO ALANI */
        .content-area {
            flex: 1;
            padding: 20px;
        }

        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
        }

        .video-item {
            background: var(--card-gray);
            border: 1px solid #222;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transition: 0.3s;
        }

        .video-item:hover {
            transform: translateY(-5px);
            border-color: var(--neon-red);
            box-shadow: 0 0 20px var(--dark-red);
        }

        .video-frame {
            position: relative;
            padding-bottom: 56.25%; /* 16:9 Oranı */
            height: 0;
            background: #000;
        }

        .video-frame iframe {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            border: none;
        }

        /* UYARI EKRANI */
        #alert-screen {
            display: none;
            position: fixed;
            top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.95);
            z-index: 10000;
            justify-content: center;
            align-items: center;
            text-align: center;
            flex-direction: column;
        }

        /* GİRİŞ EKRANI */
        #overlay {
            position: fixed;
            top:0; left:0; width:100%; height:100%;
            background: #000;
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .entry-box {
            padding: 40px;
            border: 2px solid var(--neon-red);
            text-align: center;
            background: #0a0a0a;
            box-shadow: 0 0 30px var(--dark-red);
        }
    </style>
</head>
<body>

<audio id="jazzMusic" loop>
    <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-8.mp3" type="audio/mpeg">
</audio>

<div id="overlay">
    <div class="entry-box">
        <h1 class="neon-logo" style="font-size: 2rem;">SADRAZAM POWER</h1>
        <p>İçeriği görmek için onaylayın (+18)</p>
        <button onclick="enterSite()" style="background:var(--neon-red); color:white; border:none; padding:15px 30px; cursor:pointer; font-weight:bold;">GİRİŞ YAP 🔓</button>
        <button onclick="showPremium()" style="background:gold; color:black; border:none; padding:15px 30px; cursor:pointer; font-weight:bold; margin-top:10px; display:block; width:100%;">👑 PREMIUM ÜYE OL ✨</button>
    </div>
</div>

<div id="alert-screen">
    <h1 style="color:var(--neon-red)">DİKKAT!</h1>
    <p id="alert-msg">Site yeni açıldı, içerikler yükleniyor...</p>
    <div id="timer" style="font-size: 3rem; color:white;">15</div>
</div>

<header class="logo-container">
    <div class="neon-logo">SADRAZAM POWER</div>
</header>

<div class="main-wrapper">
    <aside class="sidebar" id="sidebar">
        <h3 style="color:var(--neon-red); border-bottom:1px solid #333; padding-bottom:10px;">KATEGORİLER</h3>
        </aside>

    <main class="content-area">
        <div class="video-grid">
            <div class="video-item">
                <div class="video-frame">
                    <iframe src="https://xhamster167.click/embed/xheY5d2"></iframe>
                </div>
                <div style="padding:15px;"><h4>Üveyanne Konuşmalı Türk Porno</h4></div>
            </div>
            <div class="video-item">
                <div class="video-frame">
                    <iframe src="https://xhamster167.click/embed/xhkhyDr"></iframe>
                </div>
                <div style="padding:15px;"><h4>Türbanlı Türk Üvey Anne</h4></div>
            </div>
            <div class="video-item">
                <div class="video-frame">
                    <iframe src="https://xhamster167.click/embed/xhDghGd"></iframe>
                </div>
                <div style="padding:15px;"><h4>Ayten Abla 2021</h4></div>
            </div>
        </div>
    </main>
</div>

<script>
    const categories = ["Türk", "4K Porno", "HD Videolar", "VR Pornosu", "Amatör", "18 Yaşında", "Anal", "Olgun", "Anne", "MILF", "Lezbiyen", "BDSM", "Sakso", "Grup Seks", "Masaj", "Eş Paylaşma", "Gavat"];
    const music = document.getElementById('jazzMusic');

    // Kategorileri Doldur
    const sidebar = document.getElementById('sidebar');
    categories.forEach(c => {
        let btn = document.createElement('button');
        btn.className = 'cat-btn';
        btn.innerText = c;
        btn.onclick = () => runAlert("SİTE YENİ AÇILDI! Yakında tüm içerikler eklenecektir.", 15);
        sidebar.appendChild(btn);
    });

    function enterSite() {
        document.getElementById('overlay').style.display = 'none';
        music.play();
    }

    function showPremium() {
        runAlert("👑 PREMIUM ÜYELİK ÇOK YAKINDA AKTİF OLACAK!", 12);
    }

    function runAlert(msg, sec) {
        const screen = document.getElementById('alert-screen');
        const timerDiv = document.getElementById('timer');
        document.getElementById('alert-msg').innerText = msg;
        
        screen.style.display = 'flex';
        let count = sec;
        timerDiv.innerText = count;

        const interval = setInterval(() => {
            count--;
            timerDiv.innerText = count;
            if(count <= 0) {
                clearInterval(interval);
                screen.style.display = 'none';
            }
        }, 1000);
    }
</script>

</body>
</html>
