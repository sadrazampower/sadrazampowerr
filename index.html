<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="referrer" content="no-referrer"> <title>SADRAZAM POWER | ELITE</title>
    <style>
        :root { --neon-red: #ff0000; --bg: #000; }
        
        body { 
            margin: 0; padding: 0; background: var(--bg); color: #fff;
            font-family: 'Arial', sans-serif;
        }

        #gate {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 100000; display: flex; align-items: center; justify-content: center;
        }
        .auth-card {
            background: #0a0a0a; padding: 30px; border: 2px solid var(--neon-red);
            border-radius: 20px; text-align: center; width: 85%; max-width: 350px;
            box-shadow: 0 0 20px var(--neon-red);
        }

        #site { display: none; }
        header { padding: 20px; text-align: center; border-bottom: 2px solid var(--neon-red); background: #080808; }

        .video-container { padding: 20px; display: flex; flex-direction: column; gap: 50px; align-items: center; }
        
        /* KIRMIZI NEON ÇERÇEVE */
        .video-box { 
            background: #111; 
            border-radius: 15px; 
            width: 100%; 
            max-width: 600px; 
            border: 3px solid var(--neon-red); 
            box-shadow: 0 0 25px rgba(255, 0, 0, 0.6); 
            overflow: hidden;
        }

        .v-player-wrapper {
            width: 100%;
            aspect-ratio: 16/9;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .cover-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 10;
        }

        .play-btn {
            background: var(--neon-red);
            color: white;
            padding: 12px 25px;
            border-radius: 50px;
            font-weight: bold;
            text-transform: uppercase;
            box-shadow: 0 0 15px var(--neon-red);
        }

        .btn {
            display: block; width: 100%; padding: 15px 0; margin: 10px 0;
            background: transparent; border: 2px solid var(--neon-red);
            color: white; font-weight: bold; cursor: pointer; border-radius: 10px;
        }
    </style>
</head>
<body>

    <div id="gate">
        <div class="auth-card">
            <h1 style="color:var(--neon-red); text-shadow: 0 0 10px red;">SADRAZAM</h1>
            <button class="btn" onclick="openSite()">SİTEYE GİRİŞ YAP</button>
        </div>
    </div>

    <div id="site">
        <header><h2>SADRAZAM POWER</h2></header>
        <div class="video-container" id="feed"></div>
    </div>

<script>
    const videos = [
        {id: 1, title: "Milli Arşiv - Yerli Gizli", src: "https://www.porno5zz.shop/embed/3dff4b38fc8d2872f1ec"},
        {id: 2, title: "Üvey Anne Altyazılı", src: "https://www.porno5zz.shop/embed/c2f636f067f89cc14862"},
        {id: 3, title: "Komşu Kızı İntikam", src: "https://www.porno5zz.shop/embed/96369ab93e4f3bb068c2"},
        {id: 4, title: "Tamirci ve Ev Sahibi", src: "https://www.porno5zz.shop/embed/a5425d6965fbd4c8fbe1"},
        {id: 5, title: "Aşiret Yengesi Yasak", src: "https://www.porno5zz.shop/embed/a8ce66358eb576b8912c"}
    ];

    function openSite() {
        document.getElementById('gate').style.display = 'none';
        document.getElementById('site').style.display = 'block';
        renderContent();
    }

    function renderContent() {
        const feed = document.getElementById('feed');
        feed.innerHTML = videos.map(v => `
            <div class="video-box">
                <div class="v-player-wrapper" id="container-${v.id}">
                    <div class="cover-overlay" onclick="startVideo(${v.id}, '${v.src}')">
                        <div style="color:red; font-weight:bold; margin-bottom:10px;">SADRAZAM ÖZEL İÇERİK</div>
                        <div class="play-btn">VİDEOYU BAŞLAT ▶</div>
                    </div>
                </div>
                <div style="padding:15px; background:#0a0a0a; border-top:2px solid var(--neon-red)">
                    <b style="color:var(--neon-red); font-size:1.1rem;">${v.title}</b>
                </div>
            </div>
        `).join('');
    }

    function startVideo(id, src) {
        const container = document.getElementById(`container-${id}`);
        // sandbox ve allow öznitelikleri tarayıcı kısıtlamalarını esnetir
        container.innerHTML = `
            <iframe 
                src="${src}" 
                allow="autoplay; fullscreen; picture-in-picture" 
                allowfullscreen 
                sandbox="allow-forms allow-pointer-lock allow-same-origin allow-scripts allow-top-navigation"
                referrerpolicy="no-referrer">
            </iframe>`;
    }
</script>
</body>
</html>
