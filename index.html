<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sadrazam Power | Yalova Talep, Takip ve Yönetim Merkezi</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #050507;
        --panel: rgba(255, 255, 255, 0.03);
        --panel-2: rgba(255, 255, 255, 0.04);
        --line: rgba(255, 255, 255, 0.1);
        --text: #ffffff;
        --muted: rgba(255, 255, 255, 0.62);
        --soft: rgba(255, 255, 255, 0.45);
        --cyan: #b4f3ff;
        --cyan-bg: rgba(34, 211, 238, 0.08);
        --cyan-line: rgba(34, 211, 238, 0.22);
        --ok: rgba(52, 211, 153, 0.12);
        --ok-line: rgba(52, 211, 153, 0.22);
        --danger: rgba(251, 113, 133, 0.12);
        --danger-line: rgba(251, 113, 133, 0.22);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      html {
        scroll-behavior: smooth;
      }

      body {
        margin: 0;
        min-width: 320px;
        background:
          radial-gradient(circle at top, rgba(255, 255, 255, 0.08), transparent 24%),
          radial-gradient(circle at 80% 20%, rgba(255, 255, 255, 0.025), transparent 22%),
          linear-gradient(180deg, #020202 0%, #050505 38%, #0b0b0d 100%);
        color: #e5e7eb;
      }

      body::before,
      body::after {
        content: "";
        position: fixed;
        border-radius: 999px;
        filter: blur(80px);
        pointer-events: none;
        z-index: 0;
      }

      body::before {
        width: 380px;
        height: 380px;
        left: -80px;
        top: 40px;
        background: rgba(255, 255, 255, 0.035);
      }

      body::after {
        width: 420px;
        height: 420px;
        right: 0;
        top: 28%;
        background: rgba(120, 120, 120, 0.05);
      }

      button,
      input,
      textarea,
      select {
        font: inherit;
      }

      button {
        cursor: pointer;
      }

      a {
        color: inherit;
        text-decoration: none;
      }

      .app {
        position: relative;
        z-index: 1;
      }

      .container {
        width: min(1280px, calc(100% - 32px));
        margin: 0 auto;
      }

      .section {
        border: 1px solid var(--line);
        background: var(--panel);
        border-radius: 34px;
        box-shadow: 0 30px 100px rgba(0, 0, 0, 0.38);
      }

      .label {
        display: inline-flex;
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.04);
        border-radius: 999px;
        padding: 7px 12px;
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.32em;
        color: rgba(255, 255, 255, 0.45);
      }

      .topbar {
        display: flex;
        justify-content: flex-end;
        padding-top: 20px;
      }

      .hero {
        margin-top: 22px;
        display: grid;
        gap: 24px;
        grid-template-columns: 1.3fr 0.9fr;
      }

      .hero-main,
      .hero-side,
      .options,
      .notice,
      .panel-wrap,
      .tracker-wrap,
      .admin-header,
      .admin-list,
      .admin-detail,
      .login-left,
      .login-right {
        padding: 28px;
      }

      h1,
      h2,
      h3,
      h4,
      p {
        margin: 0;
      }

      .hero-main h1 {
        margin-top: 18px;
        max-width: 820px;
        font-size: clamp(36px, 5vw, 58px);
        line-height: 1.08;
        font-weight: 600;
        color: var(--text);
      }

      .hero-main p {
        margin-top: 18px;
        max-width: 760px;
        font-size: 16px;
        line-height: 1.95;
        color: var(--muted);
      }

      .pill-neon {
        margin-top: 16px;
        display: inline-flex;
        border: 1px solid var(--cyan-line);
        background: var(--cyan-bg);
        color: var(--cyan);
        border-radius: 999px;
        padding: 8px 13px;
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.3em;
        box-shadow: 0 0 26px rgba(34, 211, 238, 0.12);
      }

      .hero-actions {
        margin-top: 28px;
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
      }

      .btn,
      .btn-light,
      .btn-ghost,
      .btn-cyan {
        min-height: 48px;
        border-radius: 18px;
        padding: 0 22px;
        border: 1px solid transparent;
        transition: 0.2s ease;
      }

      .btn-light {
        background: #fff;
        color: #000;
        font-weight: 600;
      }

      .btn-light:hover {
        background: rgba(255, 255, 255, 0.9);
      }

      .btn-ghost {
        background: rgba(255, 255, 255, 0.05);
        border-color: var(--line);
        color: #fff;
      }

      .btn-ghost:hover {
        background: rgba(255, 255, 255, 0.08);
      }

      .btn-cyan {
        background: var(--cyan-bg);
        border-color: var(--cyan-line);
        color: var(--cyan);
      }

      .btn-cyan:hover {
        background: rgba(34, 211, 238, 0.14);
      }

      .side-list {
        margin-top: 16px;
        display: grid;
        gap: 16px;
      }

      .mini-card {
        border: 1px solid var(--line);
        background: rgba(0, 0, 0, 0.25);
        border-radius: 24px;
        padding: 18px;
      }

      .mini-card h3 {
        color: #fff;
        font-size: 15px;
        font-weight: 600;
      }

      .mini-card p {
        margin-top: 10px;
        color: rgba(255, 255, 255, 0.55);
        font-size: 14px;
        line-height: 1.8;
      }

      .options {
        margin-top: 28px;
      }

      .options-head {
        display: flex;
        justify-content: space-between;
        align-items: end;
        gap: 20px;
      }

      .options-head h2 {
        margin-top: 16px;
        color: #fff;
        font-size: 32px;
        font-weight: 600;
      }

      .options-head p {
        margin-top: 10px;
        color: rgba(255, 255, 255, 0.58);
        font-size: 14px;
        line-height: 1.8;
      }

      .option-grid {
        margin-top: 24px;
        display: grid;
        gap: 16px;
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .option-btn {
        border: 1px solid var(--line);
        background: rgba(0, 0, 0, 0.25);
        border-radius: 28px;
        padding: 22px;
        text-align: left;
        color: #fff;
      }

      .option-btn:hover {
        background: rgba(255, 255, 255, 0.05);
      }

      .option-btn small {
        display: block;
        color: rgba(255, 255, 255, 0.35);
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.3em;
      }

      .option-btn strong {
        display: block;
        margin-top: 14px;
        font-size: 22px;
        font-weight: 500;
      }

      .option-btn span {
        display: block;
        margin-top: 10px;
        color: rgba(255, 255, 255, 0.5);
        font-size: 14px;
        line-height: 1.8;
      }

      .notice {
        margin-top: 28px;
        border: 1px solid var(--ok-line);
        background: var(--ok);
        border-radius: 30px;
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.25);
      }

      .notice-row {
        display: flex;
        justify-content: space-between;
        gap: 18px;
        align-items: center;
      }

      .notice small {
        display: block;
        color: rgba(167, 243, 208, 0.72);
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.28em;
      }

      .notice h3 {
        margin-top: 10px;
        color: #fff;
        font-size: 24px;
      }

      .notice p {
        margin-top: 8px;
        font-size: 14px;
        line-height: 1.8;
        color: rgba(255, 255, 255, 0.76);
      }

      .stack {
        margin-top: 28px;
        display: grid;
        gap: 28px;
      }

      .hidden {
        display: none !important;
      }

      .panel-head {
        display: flex;
        justify-content: space-between;
        gap: 18px;
        align-items: end;
      }

      .panel-head h2 {
        margin-top: 16px;
        color: #fff;
        font-size: 32px;
        font-weight: 600;
      }

      .panel-head p {
        margin-top: 10px;
        font-size: 14px;
        line-height: 1.8;
        color: rgba(255, 255, 255, 0.58);
      }

      .form-grid {
        margin-top: 24px;
        display: grid;
        gap: 16px;
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .field,
      .field-wide {
        display: grid;
        gap: 8px;
        color: rgba(255, 255, 255, 0.72);
        font-size: 14px;
      }

      .field-wide {
        grid-column: 1 / -1;
      }

      input,
      textarea,
      select {
        width: 100%;
        border-radius: 18px;
        border: 1px solid var(--line);
        background: #0d0d10;
        color: #fff;
        padding: 14px 16px;
        outline: none;
      }

      input:focus,
      textarea:focus,
      select:focus {
        border-color: rgba(34, 211, 238, 0.35);
      }

      textarea {
        min-height: 140px;
        resize: vertical;
      }

      .form-foot {
        grid-column: 1 / -1;
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 16px;
      }

      .form-foot p {
        color: rgba(255, 255, 255, 0.55);
        font-size: 14px;
        line-height: 1.8;
      }

      .tracker-input-row {
        margin-top: 24px;
        display: flex;
        gap: 12px;
      }

      .error-box {
        margin-top: 24px;
        border: 1px solid var(--danger-line);
        background: var(--danger);
        border-radius: 20px;
        padding: 16px;
        color: #ffd7df;
        font-size: 14px;
      }

      .track-result {
        margin-top: 24px;
        border: 1px solid var(--line);
        background: rgba(0, 0, 0, 0.25);
        border-radius: 28px;
        padding: 22px;
      }

      .track-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
        border-bottom: 1px solid var(--line);
        padding-bottom: 18px;
      }

      .track-top small,
      .admin-detail small,
      .admin-list small {
        color: rgba(255, 255, 255, 0.35);
        text-transform: uppercase;
        letter-spacing: 0.24em;
        font-size: 11px;
      }

      .track-top h4,
      .admin-detail h2 {
        margin-top: 10px;
        font-size: 24px;
        color: #fff;
      }

      .stage-badge {
        display: inline-flex;
        border-radius: 999px;
        padding: 8px 12px;
        border: 1px solid rgba(255, 255, 255, 0.15);
        font-size: 11px;
        font-weight: 600;
      }

      .stage-1 { background: rgba(251, 191, 36, 0.1); border-color: rgba(251, 191, 36, 0.22); color: #fde68a; }
      .stage-2 { background: rgba(56, 189, 248, 0.1); border-color: rgba(56, 189, 248, 0.22); color: #bae6fd; }
      .stage-3 { background: rgba(167, 139, 250, 0.1); border-color: rgba(167, 139, 250, 0.22); color: #ddd6fe; }
      .stage-4 { background: rgba(52, 211, 153, 0.1); border-color: rgba(52, 211, 153, 0.22); color: #a7f3d0; }

      .stage-grid {
        margin-top: 18px;
        display: grid;
        gap: 14px;
        grid-template-columns: repeat(4, minmax(0, 1fr));
      }

      .stage-card {
        border-radius: 22px;
        padding: 16px;
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.03);
        color: rgba(255, 255, 255, 0.55);
      }

      .stage-card.active {
        border-color: rgba(34, 211, 238, 0.24);
        background: rgba(34, 211, 238, 0.08);
        color: #fff;
        box-shadow: 0 0 30px rgba(34, 211, 238, 0.12);
      }

      .stage-card .title {
        margin-top: 8px;
        font-size: 14px;
        font-weight: 600;
      }

      .track-note {
        margin-top: 18px;
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.03);
        border-radius: 18px;
        padding: 14px 16px;
        color: rgba(255, 255, 255, 0.62);
        font-size: 14px;
        line-height: 1.8;
      }

      .login-page,
      .admin-page {
        min-height: 100vh;
        padding: 20px 0 40px;
      }

      .login-grid {
        display: grid;
        gap: 26px;
        grid-template-columns: 1.1fr 0.9fr;
        align-items: center;
      }

      .login-left h1 {
        margin-top: 18px;
        font-size: clamp(34px, 5vw, 56px);
        line-height: 1.1;
        color: #fff;
      }

      .login-left p,
      .admin-header p {
        margin-top: 16px;
        font-size: 15px;
        line-height: 1.95;
        color: rgba(255, 255, 255, 0.62);
      }

      .double-box {
        margin-top: 24px;
        display: grid;
        gap: 16px;
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .double-box .mini-card p {
        margin-top: 8px;
      }

      .login-form {
        margin-top: 24px;
        display: grid;
        gap: 16px;
      }

      .admin-header {
        display: flex;
        justify-content: space-between;
        gap: 20px;
        align-items: center;
      }

      .admin-header h1 {
        margin-top: 16px;
        font-size: clamp(30px, 4vw, 48px);
        color: #fff;
      }

      .admin-layout {
        margin-top: 24px;
        display: grid;
        gap: 24px;
        grid-template-columns: 420px minmax(0, 1fr);
      }

      .admin-list input {
        margin-top: 18px;
      }

      .list-scroll {
        margin-top: 18px;
        max-height: 68vh;
        overflow: auto;
        display: grid;
        gap: 12px;
        padding-right: 6px;
      }

      .request-item {
        width: 100%;
        border-radius: 24px;
        border: 1px solid var(--line);
        background: rgba(0, 0, 0, 0.25);
        color: #fff;
        text-align: left;
        padding: 16px;
      }

      .request-item.active {
        border-color: rgba(34, 211, 238, 0.24);
        background: rgba(34, 211, 238, 0.08);
        box-shadow: 0 0 30px rgba(34, 211, 238, 0.1);
      }

      .request-item .top {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        align-items: center;
      }

      .request-item .name {
        font-size: 15px;
        font-weight: 600;
      }

      .request-item .type {
        margin-top: 10px;
        color: rgba(255, 255, 255, 0.35);
        text-transform: uppercase;
        letter-spacing: 0.24em;
        font-size: 11px;
      }

      .request-item .subject {
        margin-top: 12px;
        font-size: 14px;
        color: rgba(255, 255, 255, 0.65);
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }

      .request-item .meta {
        margin-top: 12px;
        display: flex;
        justify-content: space-between;
        gap: 12px;
        font-size: 12px;
        color: rgba(255, 255, 255, 0.35);
      }

      .admin-detail-grid {
        margin-top: 24px;
        display: grid;
        gap: 20px;
        grid-template-columns: 1.1fr 0.9fr;
      }

      .box {
        border: 1px solid var(--line);
        background: rgba(0, 0, 0, 0.25);
        border-radius: 26px;
        padding: 18px;
      }

      .box h3 {
        margin-top: 10px;
        color: #fff;
        font-size: 24px;
      }

      .info-grid {
        margin-top: 16px;
        display: grid;
        gap: 12px;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        font-size: 14px;
        color: rgba(255, 255, 255, 0.75);
      }

      .info-grid span {
        color: rgba(255, 255, 255, 0.4);
      }

      .text-block {
        margin-top: 12px;
        color: rgba(255, 255, 255, 0.66);
        line-height: 1.95;
        font-size: 14px;
        white-space: pre-wrap;
      }

      .logs {
        margin-top: 16px;
        display: grid;
        gap: 12px;
      }

      .log-item {
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.03);
        border-radius: 20px;
        padding: 14px;
      }

      .log-row {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        align-items: center;
      }

      .log-title {
        color: #fff;
        font-size: 14px;
        font-weight: 600;
      }

      .log-date {
        color: rgba(255, 255, 255, 0.4);
        font-size: 12px;
      }

      .log-type {
        margin-top: 8px;
        color: rgba(255, 255, 255, 0.35);
        text-transform: uppercase;
        letter-spacing: 0.22em;
        font-size: 11px;
      }

      .log-note {
        margin-top: 8px;
        color: rgba(255, 255, 255, 0.6);
        font-size: 14px;
        line-height: 1.8;
      }

      .stage-selects {
        margin-top: 16px;
        display: grid;
        gap: 12px;
      }

      .stage-select-btn {
        width: 100%;
        border-radius: 22px;
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.03);
        color: #fff;
        text-align: left;
        padding: 16px;
      }

      .stage-select-btn.active {
        border-color: rgba(34, 211, 238, 0.24);
        background: rgba(34, 211, 238, 0.08);
        box-shadow: 0 0 30px rgba(34, 211, 238, 0.1);
      }

      .stage-select-btn b {
        display: block;
        margin-top: 8px;
        font-size: 14px;
      }

      .stage-select-btn p {
        margin-top: 8px;
        font-size: 14px;
        line-height: 1.8;
        color: rgba(255, 255, 255, 0.55);
      }

      .summary-grid {
        margin-top: 16px;
        display: grid;
        gap: 12px;
      }

      .summary-grid .mini-card {
        background: rgba(255, 255, 255, 0.03);
      }

      .empty {
        padding: 36px;
        text-align: center;
        color: rgba(255, 255, 255, 0.55);
      }

      .muted {
        color: rgba(255, 255, 255, 0.6);
      }

      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        border: 0;
      }

      ::-webkit-scrollbar {
        width: 10px;
        height: 10px;
      }

      ::-webkit-scrollbar-track {
        background: rgba(255, 255, 255, 0.03);
      }

      ::-webkit-scrollbar-thumb {
        background: rgba(255, 255, 255, 0.14);
        border-radius: 999px;
      }

      ::-webkit-scrollbar-thumb:hover {
        background: rgba(255, 255, 255, 0.22);
      }

      @media (max-width: 1100px) {
        .hero,
        .login-grid,
        .admin-layout,
        .admin-detail-grid {
          grid-template-columns: 1fr;
        }
      }

      @media (max-width: 820px) {
        .option-grid,
        .stage-grid,
        .double-box,
        .form-grid,
        .info-grid {
          grid-template-columns: 1fr;
        }

        .options-head,
        .panel-head,
        .notice-row,
        .track-top,
        .admin-header,
        .form-foot,
        .tracker-input-row,
        .log-row {
          flex-direction: column;
          align-items: stretch;
        }

        .hero-main,
        .hero-side,
        .options,
        .notice,
        .panel-wrap,
        .tracker-wrap,
        .admin-header,
        .admin-list,
        .admin-detail,
        .login-left,
        .login-right {
          padding: 22px;
        }
      }
    </style>
  </head>
  <body>
    <div class="app" id="app"></div>

    <script>
      const STORAGE_KEY = "sadrazam-power-talep-kayitlari-v5";
      const ADMIN_SESSION_KEY = "sadrazam-power-admin-session-v5";
      const ADMIN_PASSWORD = "adminaptal";
      const CALL_TIME_OPTIONS = ["15.40", "16.40", "17.40 (çoğunlukla dolu)"];

      const processStages = [
        { stage: 1, title: "İşleme alındı", description: "Talebiniz sisteme alındı ve işlem numarası oluşturuldu." },
        { stage: 2, title: "Yöneticiler tarafından görüldü", description: "Talep yönetim ekranında incelemeye alındı." },
        { stage: 3, title: "Sonuç çıkması bekleniyor", description: "İşlem için son durum hazırlanıyor." },
        { stage: 4, title: "Yakında iletişime geçeceğiz", description: "Talebiniz için geri dönüş aşamasına geçildi." },
      ];

      const kindLabels = {
        call: "Sizi arayalım",
        mail: "Size yazalım",
      };

      const highlightCards = [
        {
          title: "Yalova talepleri",
          description: "Numara öğrenme, ürün, item ve özel talepleriniz için kayıt bırakın.",
        },
        {
          title: "Detaylı başlıklar",
          description: "İstediğiniz konuyu açık biçimde yazın, kayıt doğrudan işleme alınsın.",
        },
        {
          title: "İşlem takibi",
          description: "Her kayıt işlem numarası ile sistemde görüntülenir ve adım adım ilerler.",
        },
      ];

      const state = {
        route: getHashRoute(),
        adminAuthenticated: sessionStorage.getItem(ADMIN_SESSION_KEY) === "true",
        requests: loadRequests(),
        openPanel: null,
        submissionNotice: null,
        adminQuery: "",
        adminSelectedId: null,
      };

      if (state.requests[0]) {
        state.adminSelectedId = state.requests[0].id;
      }

      function getHashRoute() {
        return window.location.hash === "#/admin" ? "admin" : "home";
      }

      function getId() {
        if (window.crypto && typeof window.crypto.randomUUID === "function") {
          return window.crypto.randomUUID();
        }
        return `${Date.now()}-${Math.random().toString(36).slice(2, 10)}`;
      }

      function getRequestNo() {
        const year = new Date().getFullYear();
        const randomBlock = Math.floor(100000 + Math.random() * 900000);
        return `SP-${year}-${randomBlock}`;
      }

      function getStageLabel(stage) {
        const found = processStages.find((item) => item.stage === stage);
        return found ? found.title : processStages[0].title;
      }

      function createLog(stage, actor, note, at) {
        return {
          id: getId(),
          stage,
          title: getStageLabel(stage),
          actor,
          at: at || new Date().toISOString(),
          note,
        };
      }

      function stageFromUnknown(value) {
        return [1, 2, 3, 4].includes(value) ? value : 1;
      }

      function normalizeLog(raw) {
        if (!raw || typeof raw !== "object") return null;
        const stage = stageFromUnknown(raw.stage);
        return {
          id: typeof raw.id === "string" ? raw.id : getId(),
          stage,
          title: typeof raw.title === "string" ? raw.title : getStageLabel(stage),
          actor: raw.actor === "admin" ? "admin" : "system",
          at: typeof raw.at === "string" ? raw.at : new Date().toISOString(),
          note: typeof raw.note === "string" ? raw.note : undefined,
        };
      }

      function normalizeRequest(raw) {
        if (!raw || typeof raw !== "object") return null;
        const kind = raw.kind === "call" || raw.kind === "mail" ? raw.kind : null;
        if (!kind || typeof raw.name !== "string") return null;
        const processStage = stageFromUnknown(raw.processStage);
        const createdAt = typeof raw.createdAt === "string" ? raw.createdAt : new Date().toISOString();
        const logs = Array.isArray(raw.logs) ? raw.logs.map(normalizeLog).filter(Boolean) : [];
        return {
          id: typeof raw.id === "string" ? raw.id : getId(),
          requestNo: typeof raw.requestNo === "string" ? raw.requestNo : getRequestNo(),
          kind,
          name: raw.name.trim(),
          phone: typeof raw.phone === "string" ? raw.phone : "",
          email: typeof raw.email === "string" ? raw.email : "",
          subject: typeof raw.subject === "string" && raw.subject.trim() ? raw.subject.trim() : "Genel talep",
          details: typeof raw.details === "string" && raw.details.trim() ? raw.details.trim() : "Talep sahibi ek açıklama bırakmadı.",
          availability: typeof raw.availability === "string" ? raw.availability : "",
          createdAt,
          processStage,
          logs: logs.length ? logs : [createLog(processStage, "system", "Kayıt oluşturuldu", createdAt)],
        };
      }

      function loadRequests() {
        try {
          const raw = localStorage.getItem(STORAGE_KEY);
          if (!raw) return [];
          const parsed = JSON.parse(raw);
          if (!Array.isArray(parsed)) return [];
          return parsed
            .map(normalizeRequest)
            .filter(Boolean)
            .sort((a, b) => new Date(b.createdAt).getTime() - new Date(a.createdAt).getTime());
        } catch {
          return [];
        }
      }

      function saveRequests() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(state.requests));
      }

      function formatDate(value) {
        return new Intl.DateTimeFormat("tr-TR", {
          day: "2-digit",
          month: "2-digit",
          year: "numeric",
          hour: "2-digit",
          minute: "2-digit",
        }).format(new Date(value));
      }

      function stageBadge(stage) {
        return `<span class="stage-badge stage-${stage}">${escapeHtml(getStageLabel(stage))}</span>`;
      }

      function escapeHtml(value) {
        return String(value)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/\"/g, "&quot;")
          .replace(/'/g, "&#039;");
      }

      function filteredRequests() {
        const value = state.adminQuery.trim().toLowerCase();
        if (!value) return state.requests;
        return state.requests.filter((item) => {
          const pool = [
            item.requestNo,
            item.name,
            item.phone || "",
            item.email || "",
            item.subject,
            item.details,
            item.availability || "",
            kindLabels[item.kind],
          ].join(" ").toLowerCase();
          return pool.includes(value);
        });
      }

      function selectedRequest() {
        const list = filteredRequests();
        return list.find((item) => item.id === state.adminSelectedId) || list[0] || null;

      function updateStage(requestId, stage) {
        state.requests = state.requests.map((item) => {
          if (item.id !== requestId || item.processStage === stage) return item;
          return {
            ...item,
            processStage: stage,
            logs: [...item.logs, createLog(stage, "admin", `İşlem adımı ${stage}. seviyeye güncellendi.`)],
          };
        }).sort((a, b) => new Date(b.createdAt).getTime() - new Date(a.createdAt).getTime());
        saveRequests();
        render();
      }

          availability: form.availability.value,

      let audioStarted = false;
      function startAmbientPiano() {
        if (audioStarted) return;
        audioStarted = true;
        const AudioContextClass = window.AudioContext || window.webkitAudioContext;
        if (!AudioContextClass) return;
        const context = new AudioContextClass();
        const master = context.createGain();
        master.gain.value = 0.018;
        master.connect(context.destination);
        const notes = [261.63, 293.66, 329.63, 392.0, 440.0, 523.25];
        function playNote(frequency, delay) {
          const oscillator = context.createOscillator();
          const gain = context.createGain();
          oscillator.type = "triangle";
          oscillator.frequency.value = frequency;
          gain.gain.value = 0.0001;
          oscillator.connect(gain);
          gain.connect(master);
          const startAt = context.currentTime + delay;
          gain.gain.exponentialRampToValueAtTime(0.05, startAt + 0.02);
          gain.gain.exponentialRampToValueAtTime(0.0001, startAt + 2.3);
          oscillator.start(startAt);
          oscillator.stop(startAt + 2.4);
        }
        function schedule() {
          const base = notes[Math.floor(Math.random() * notes.length)];
          playNote(base, 0);
          playNote(base * (Math.random() > 0.5 ? 1.5 : 2), 0.42);
          setTimeout(schedule, 3600 + Math.random() * 1800);
        }
        context.resume().catch(() => undefined);
        schedule();
      }

          return;

        if (state.route === "admin" && state.adminAuthenticated) {
          app.innerHTML = adminView();
          bindAdminEvents();
          return;
        }

        app.innerHTML = homeView();
        bindHomeEvents();
      }

      function bindHomeEvents() {
        const adminBtn = document.getElementById("open-admin-btn");
        if (adminBtn) adminBtn.addEventListener("click", openAdmin);

        const scrollBtn = document.getElementById("scroll-options-btn");
        if (scrollBtn) {
          scrollBtn.addEventListener("click", () => {
            document.getElementById("options-section")?.scrollIntoView({ behavior: "smooth", block: "start" });
          });
        }

        document.querySelectorAll("[data-open-panel]").forEach((button) => {
          button.addEventListener("click", () => {
            state.openPanel = button.getAttribute("data-open-panel");
            render();
            const targetId =
              state.openPanel === "call"
                ? "call-panel"
                : state.openPanel === "mail"
                ? "mail-panel"
                : "tracking-panel";
            setTimeout(() => {
              document.getElementById(targetId)?.scrollIntoView({ behavior: "smooth", block: "start" });
            }, 100);
          });
        });

        document.querySelectorAll("[data-close-panel]").forEach((button) => {
          button.addEventListener("click", () => {
            state.openPanel = null;
            render();
          });
        });

        const callForm = document.getElementById("call-form");
        if (callForm) {
          callForm.addEventListener("submit", (event) => {
            event.preventDefault();
            createCallRequest(callForm);
            callForm.reset();
            const select = callForm.querySelector('select[name="availability"]');
            if (select) select.value = CALL_TIME_OPTIONS[0];
            render();
            setTimeout(() => document.querySelector(".notice")?.scrollIntoView({ behavior: "smooth", block: "start" }), 80);
          });
        }

        const mailForm = document.getElementById("mail-form");
        if (mailForm) {
          mailForm.addEventListener("submit", (event) => {
            event.preventDefault();
            createMailRequest(mailForm);
            mailForm.reset();
            render();
            setTimeout(() => document.querySelector(".notice")?.scrollIntoView({ behavior: "smooth", block: "start" }), 80);
          });
        }

        const trackForm = document.getElementById("track-form");
        if (trackForm) {
          trackForm.addEventListener("submit", (event) => {
            event.preventDefault();
            const input = document.getElementById("track-input");
            const feedback = document.getElementById("track-feedback");
            if (!input || !feedback) return;
            const value = input.value.trim().toLowerCase();
            const matched = state.requests.find((entry) => entry.requestNo.toLowerCase() === value);
            if (!matched) {
              feedback.innerHTML = `<div class="error-box">İşlem numarası bulunamadı. Lütfen tekrar kontrol edin.</div>`;
              return;
            }
            feedback.innerHTML = `
              <div class="track-result">
                <div class="track-top">
                  <div>
                    <small>İşlem no</small>
                    <h4>${escapeHtml(matched.requestNo)}</h4>
                  </div>
                  ${stageBadge(matched.processStage)}
                </div>
                <div class="stage-grid">
                  ${processStages.map((item) => `
                    <div class="stage-card ${matched.processStage >= item.stage ? "active" : ""}">
                      <small>Adım ${item.stage}</small>
                      <div class="title">${escapeHtml(item.title)}</div>
                    </div>
                  `).join("")}
                </div>
                <div class="track-note">Talebiniz en geç 1 iş günü içinde yanıtlanır.</div>
              </div>
            `;
          });
        }
      }

      function bindLoginEvents() {
        const form = document.getElementById("login-form");
        if (form) {
          form.addEventListener("submit", (event) => {
            event.preventDefault();
            const password = form.password.value;
            if (password !== ADMIN_PASSWORD) {
              alert("Şifre hatalııııııı.");
              return;
            }
            state.adminAuthenticated = true;
            sessionStorage.setItem(ADMIN_SESSION_KEY, "true");
            render();
          });
        }

        const backBtn = document.getElementById("back-home-btn");
        if (backBtn) {
          backBtn.addEventListener("click", () => {
            window.location.hash = "#/";
          });
        }
      }

      function bindAdminEvents() {
        const logoutBtn = document.getElementById("logout-btn");
        if (logoutBtn) logoutBtn.addEventListener("click", logoutAdmin);

        const search = document.getElementById("admin-search");
        if (search) {
          search.addEventListener("input", (event) => {
            state.adminQuery = event.target.value;
            const list = filteredRequests();
            if (!list.some((item) => item.id === state.adminSelectedId)) {
              state.adminSelectedId = list[0] ? list[0].id : null;
            }
            render();
          });
        }

        document.querySelectorAll("[data-select-id]").forEach((button) => {
          button.addEventListener("click", () => {
            state.adminSelectedId = button.getAttribute("data-select-id");
            render();
          });
        });

        document.querySelectorAll("[data-stage-update]").forEach((button) => {
          button.addEventListener("click", () => {
            const stage = Number(button.getAttribute("data-stage-update"));
            const requestId = button.getAttribute("data-request-id");
            if (!requestId || !stage) return;
            updateStage(requestId, stage);
          });
        });
      }

      window.addEventListener("hashchange", () => {
        state.route = getHashRoute();
        render();
      });

      window.addEventListener("pointerdown", startAmbientPiano, { once: true });

      render();
    </script>
  </body>
</html>
