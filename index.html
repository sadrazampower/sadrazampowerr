<!DOCTYPE html> <html lang="tr"> <head> <meta charset="UTF-8"> <title>SADRAZAM POWER | Özel Panel</title> <script src="https://cdn.tailwindcss.com"></script> <style> body { background: #000; color: white; font-family: 'Arial', sans-serif; } .neon-yazi { color: #ff0000; text-shadow: 0 0 15px #ff0000; font-weight: 900; } #uyari-ekrani { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 999; flex-direction: column; align-items: center; justify-content: center; } </style> </head> <body onclick="muzikCal()"> <audio id="bgMuzik" loop> <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3" type="audio/mpeg"> </audio> <nav class="p-5 border-b border-red-900 flex justify-between items-center bg-zinc-950"> <div class="text-2xl font-bold italic">SADRAZAM <span class="text-red-600">POWER</span></div> <div class="space-x-4"> <button onclick="sistemGuncelle()" class="hover:text-red-500 uppercase text-xs">Kategoriler</button> <button onclick="sistemGuncelle()" class="hover:text-red-500 uppercase text-xs">Canlı Yayın</button> </div> </nav> <div class="max-w-5xl mx-auto mt-10 p-5"> <h1 id="video-baslik" class="text-3xl font-bold mb-6 text-red-600 border-l-4 border-red-600 pl-4"> SENİN İSTEDİĞİN VİDEO BAŞLIĞI BURAYA </h1> <div class="rounded-xl overflow-hidden border-2 border-red-900 shadow-[0_0_50px_rgba(255,0,0,0.2)]"> <video controls class="w-full"> <source src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/mp4"> Tarayıcı desteklemiyor. </video> </div> <div class="mt-10 grid grid-cols-2 md:grid-cols-4 gap-4"> <div onclick="sistemGuncelle()" class="h-32 bg-zinc-900 rounded border border-zinc-800 flex items-center justify-center cursor-pointer hover:bg-red-900/10 hover:border-red-600 transition"> <span class="text-zinc-600 text-xs uppercase">Sıradaki Video</span> </div> <div onclick="sistemGuncelle()" class="h-32 bg-zinc-900 rounded border border-zinc-800 flex items-center justify-center cursor-pointer hover:bg-red-900/10 hover:border-red-600 transition"> <span class="text-zinc-600 text-xs uppercase">Sıradaki Video</span> </div> </div> </div> <div id="uyari-ekrani"> <div class="w-16 h-16 border-4 border-red-600 border-t-transparent rounded-full animate-spin mb-6"></div> <h2 class="neon-yazi text-4xl mb-4 italic">SİSTEM GÜNCELLENİYOR</h2> <p class="text-zinc-400 tracking-widest animate-pulse">ANA SAYFAYA YÖNLENDİRİLİYORSUNUZ...</p> </div> <script> function muzikCal() { document.getElementById("bgMuzik").play(); } function sistemGuncelle() { const ekran = document.getElementById("uyari-ekrani"); ekran.style.display = "flex"; setTimeout(() => { ekran.style.display = "none"; }, 3000); // 3 saniye sonra uyarı kapanır } </script> </body> </html>
