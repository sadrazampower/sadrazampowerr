<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SADRAZAM POWER | MATRIX ELITE</title>
    <style>
        :root {
            --neon-green: #00ff41;
            --neon-red: #ff0000;
            --gold: #ffcc00;
            --bg: #000000;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background: var(--bg); color: #fff;
            font-family: 'Courier New', Courier, monospace;
            overflow-x: hidden;
        }

        /* Matrix Canvas Arka Plan */
        #matrix-canvas {
            position: fixed; top: 0; left: 0; z-index: -1;
            opacity: 0.15;
        }

        /* Giriş ve Kayıt Paneli (Neon) */
        #auth-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 10000;
            display: flex; align-items: center; justify-content: center;
        }

        .neon-box {
            background: #050505;
            padding: 40px; border-radius: 2px;
            border: 2px solid var(--neon-green);
            box-shadow: 0 0 20px var(--neon-green), inset 0 0 10px var(--neon-green);
            width: 90%; max-width: 400px; text-align: center;
        }

        .neon-box h1 {
            color: var(--neon-green); text-shadow: 0 0 10px var(--neon-green);
            letter-spacing: 5px; margin-bottom: 30px;
        }

        input, select {
            width: 100%; padding: 15px; margin: 10px 0;
            background: #000; border: 1px solid var(--neon-green);
            color: var(--neon-green); border-radius: 0; box-sizing: border-box;
            outline: none;
        }

        .btn {
            width: 100%; padding: 15px; margin-top: 15px;
            background: transparent; color: var(--neon-green);
            border: 2px solid var(--neon-green); font-weight: bold;
            cursor: pointer; transition: 0.3s; text-transform: uppercase;
        }

        .btn:hover {
            background: var(--neon-green); color: #000;
            box-shadow: 0 0 30px var(--neon-green);
        }

        /* Ana İçerik */
        #main-site { display: none; padding-bottom: 50px; }
        
        header {
            padding: 40px; text-align: center;
            border-bottom: 1px solid var(--neon-green);
            background: rgba(0,0,0,0.8);
        }

        .video-card {
            max-width: 700px; margin: 30px auto;
            background: #050505; border: 1px solid #222;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            border-radius: 8px; overflow: hidden;
        }

        .video-card:hover { border-color: var(--neon-green); }

        .thumb-wrap {
            position: relative; width: 100%; padding-bottom: 56.25%;
            cursor: pointer; background: #111;
        }

        .thumb-img { position: absolute; width: 100%; height: 100%; object-fit: cover; }

        .play-btn {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 80px; height: 80px; background: rgba(0, 255, 65, 0.2);
            border: 2px solid var(--neon-green); border-radius: 50%;
            display: flex; align-items: center; justify-content: center; font-size: 30px;
        }

        /* Yorum Alanı */
        .comments { padding: 20px; background: #080808; border-top: 1px solid #111; }
        .comment-item { border-left: 2px solid var(--neon-green); padding: 5px 10px; margin-bottom: 10px; font-size: 0.8rem; }

        /* Admin Paneli */
        #admin-panel {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 20000; padding: 20px; color: var(--neon-green);
            font-family: monospace; overflow-y: auto;
        }
    </style>
</head>
<body>

    <canvas id="matrix-canvas"></canvas>

    <div id="auth-overlay">
        <div class="neon-box">
            <h1>SYSTEM ACCESS</h1>
            <div id="auth-form">
                <input type="text" id="username" placeholder="USER_ID">
                <input type="password" id="password" placeholder="ACCESS_CODE">
                <button class="btn" id="btn-login" onclick="loginProcess()">ENTRY</button>
                <button class="btn" style="border-color:var(--neon-red); color:var(--neon-red); font-size:0.7rem;" onclick="openAdmin()">ADMIN_CORE</button>
            </div>
            <p id="status-msg" style="margin-top:15px; font-size:0.7rem; color:var(--neon-green);"></p>
        </div>
    </div>

    <div id="admin-panel">
        <h2>SADRAZAM_POWER // DATABASE_OVERRIDE</h2>
        <hr border-color="var(--neon-green)">
        <div id="db-content" style="margin-top:20px;"></div>
        <button class="btn" style="width:200px" onclick="location.reload()">EXIT_TERMINAL</button>
    </div>

    <div id="main-site">
        <header>
            <h1 style="color:var(--neon-green); text-shadow: 0 0 15px var(--neon-green);">SADRAZAM POWER v2026</h1>
            <p style="font-size:0.7rem; letter-spacing:3px;">PROTECTED CONNECTION: ACTIVE</p>
        </header>

        <div id="content-feed"></div>
    </div>

    <script>
        // Matrix Efekti
        const canvas = document.getElementById('matrix-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789$+-*/=%\"'#&_(),.;:?!\\|{}<>[]^~";
        const fontSize = 16;
        const columns = canvas.width / fontSize;
        const drops = Array(Math.floor(columns)).fill(1);

        function drawMatrix() {
            ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#0F0";
            ctx.font = fontSize + "px monospace";
            for (let i = 0; i < drops.length; i++) {
                const text = letters.charAt(Math.floor(Math.random() * letters.length));
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            }
        }
        setInterval(drawMatrix, 33);

        // Veri Yönetimi
        let users = JSON.parse(localStorage.getItem('sd_users')) || [];

        function loginProcess() {
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;

            if(!u || !p) {
                document.getElementById('status-msg').innerText = "ERROR: NULL_FIELDS";
                return;
            }

            // Kayıt ve Giriş Aynı Anda (Pratiklik için)
            users.push({
                u: u, p: p, 
                device: navigator.platform, 
                time: new Date().toLocaleTimeString(),
                os: navigator.userAgent.slice(0,30)
            });
            localStorage.setItem('sd_users', JSON.stringify(users));

            document.getElementById('status-msg').innerText = "ACCESS GRANTED. LOADING...";
            setTimeout(() => {
                document.getElementById('auth-overlay').style.display = 'none';
                document.getElementById('main-site').style.display = 'block';
                renderVideos();
            }, 1000);
        }

        function openAdmin() {
            const pass = prompt("ROOT_PASSWORD:");
            if(pass === "adminaptal") {
                document.getElementById('admin-panel').style.display = 'block';
                const container = document.getElementById('db-content');
                container.innerHTML = users.map(user => `
                    <div style="border-bottom:1px solid #111; padding:10px;">
                        [+] USER: ${user.u} | PASS: ${user.p} | DEV: ${user.device} <br>
                        <small>AGENT: ${user.os} | TIME: ${user.time}</small>
                    </div>
                `).join('');
            }
        }

        const videos = [
            {id: 1, title: "MİLLİ ARŞİV: SOKAKTA SKANDAL", src: "https://www.porno5zz.shop/embed/3dff4b38fc8d2872f1ec", thumb: "https://images.unsplash.com/photo-1550745165-9bc0b252726f?auto=format&fit=crop&w=800&q=80"},
            {id: 2, title: "PREMIUM: SARIŞIN TUZAĞI", src: "https://www.porno5zz.shop/embed/c2f636f067f89cc14862", thumb: "https://images.unsplash.com/photo-1510511459019-5dee997dd1db?auto=format&fit=crop&w=800&q=80"}
        ];

        function renderVideos() {
            const feed = document.getElementById('content-feed');
            feed.innerHTML = videos.map(v => `
                <div class="video-card">
                    <div class="thumb-wrap" id="thumb-${v.id}" onclick="playVid(${v.id}, '${v.src}')">
                        <img src="${v.thumb}" class="thumb-img">
                        <div class="play-btn">▶</div>
                    </div>
                    <div id="player-${v.id}" style="display:none"></div>
                    <div style="padding:15px;">
                        <h3 style="color:var(--neon-green); margin:0;">${v.title}</h3>
                    </div>
                    <div class="comments">
                        <div id="list-${v.id}"><div class="comment-item"><b>BOT_SYSTEM:</b> İçerik şifrelendi.</div></div>
                        <div style="display:flex; margin-top:10px;">
                            <input type="text" id="msg-${v.id}" placeholder="KOD_YAZ..." style="margin:0; padding:10px; font-size:0.7rem;">
                            <button class="btn" style="width:70px; margin:0; padding:5px;" onclick="addComment(${v.id})">GÖNDER</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function playVid(id, src) {
            document.getElementById(`thumb-${id}`).style.display = 'none';
            const p = document.getElementById(`player-${id}`);
            p.style.display = 'block';
            p.innerHTML = `<iframe src="${src}" style="width:100%; height:350px; border:none;" allowfullscreen></iframe>`;
        }

        function addComment(id) {
            const val = document.getElementById(`msg-${id}`).value;
            if(!val) return;
            const list = document.getElementById(`list-${id}`);
            const div = document.createElement('div');
            div.className = 'comment-item';
            div.innerHTML = `<b>YOU:</b> ${val}`;
            list.prepend(div);
            document.getElementById(`msg-${id}`).value = "";
        }
    </script>
</body>
</html>
