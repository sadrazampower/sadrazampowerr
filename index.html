<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SADRAZAM POWER | CORPORATE ELITE</title>
    <style>
        :root {
            --gold: #ffbd39;
            --deep-red: #8b0000;
            --dark-glass: rgba(10, 10, 10, 0.9);
            --neon-blue: #00d2ff;
        }

        body {
            margin: 0; padding: 0;
            background: #000;
            color: #fff;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            user-select: none;
        }

        /* Arka Plan Hareketli Yazı Efekti (Watermark) */
        .bg-text-wrapper {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; pointer-events: none; opacity: 0.05;
            display: flex; flex-wrap: wrap; justify-content: space-around;
        }

        .bg-text {
            font-size: 5rem; font-weight: 900; 
            animation: colorShift 10s infinite alternate;
            padding: 50px;
        }

        @keyframes colorShift {
            0% { color: var(--gold); transform: scale(1); }
            50% { color: var(--neon-blue); transform: scale(1.1) rotate(5deg); }
            100% { color: var(--deep-red); transform: scale(1); }
        }

        /* Auth Panel */
        #auth-gate {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 9999; display: flex; align-items: center; justify-content: center;
        }

        .premium-card {
            background: var(--dark-glass); border: 2px solid var(--gold);
            padding: 40px; border-radius: 20px; width: 85%; max-width: 450px;
            text-align: center; box-shadow: 0 0 50px rgba(255, 189, 57, 0.1);
        }

        input, select {
            width: 100%; padding: 15px; margin: 10px 0;
            background: #1a1a1a; border: 1px solid #333; color: #fff;
            border-radius: 8px; font-weight: bold;
        }

        .main-btn {
            width: 100%; padding: 15px; border: none; border-radius: 8px;
            font-weight: 900; cursor: pointer; text-transform: uppercase;
            letter-spacing: 2px; transition: 0.4s; margin-top: 15px;
        }

        .btn-gold { background: var(--gold); color: #000; }
        .btn-gold:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(255, 189, 57, 0.4); }

        /* Video Feed */
        #main-site { display: none; }
        .nav-bar {
            background: rgba(0,0,0,0.8); backdrop-filter: blur(10px);
            padding: 15px; sticky: top; top: 0; z-index: 100;
            border-bottom: 1px solid #222; text-align: center;
        }

        .video-grid { padding: 20px; display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 30px; }
        
        .video-item {
            background: #0d0d0d; border-radius: 15px; overflow: hidden;
            border: 1px solid #1a1a1a; transition: 0.3s;
        }

        .video-item:hover { border-color: var(--gold); transform: translateY(-5px); }

        /* Thumbnail Yapısı */
        .thumb-wrap {
            position: relative; width: 100%; padding-bottom: 56.25%;
            background-color: #111; cursor: pointer;
        }

        .thumb-img {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover;
        }

        .play-icon {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 80px; height: 80px; background: rgba(255, 189, 57, 0.9);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 30px; color: #000;
        }

        /* Yorumlar */
        .comment-box { padding: 20px; border-top: 1px solid #1a1a1a; }
        .comment-display { max-height: 150px; overflow-y: auto; margin-bottom: 15px; }
        .c-item { background: #151515; padding: 10px; border-radius: 5px; margin-bottom: 5px; font-size: 0.85rem; border-left: 3px solid var(--gold); }

        /* Admin Dashboard */
        #admin-panel {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #050505; z-index: 10000; padding: 30px;
        }
    </style>
</head>
<body>

    <div class="bg-text-wrapper">
        <div class="bg-text">SADRAZAM</div>
        <div class="bg-text">POWER</div>
        <div class="bg-text">SADRAZAM</div>
        <div class="bg-text">2026</div>
        <div class="bg-text">POWER</div>
    </div>

    <audio id="ambiance" loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-10.mp3" type="audio/mpeg">
    </audio>

    <div id="auth-gate">
        <div class="premium-card" id="reg-form">
            <h1 style="color:var(--gold); letter-spacing: 5px;">SADRAZAM POWER</h1>
            <p style="color:#666;">Kurumsal Erişim ve Kayıt Paneli</p>
            <input type="text" id="u-name" placeholder="Kullanıcı Adı">
            <input type="password" id="u-pass" placeholder="Şifre">
            <select id="u-tier">
                <option value="Elite">Elite Üye</option>
                <option value="Premium">Premium Gold (Kısıtlı)</option>
            </select>
            <button class="btn-gold main-btn" onclick="registerUser()">Sisteme Kayıt Ol</button>
            <button class="main-btn" style="background:#222; color:#fff;" onclick="openAdmin()">Admin Kontrol</button>
        </div>
    </div>

    <div id="admin-panel">
        <h2 style="color:var(--gold)">KURUMSAL YÖNETİM MERKEZİ</h2>
        <div id="admin-stats" style="display:grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap:20px;">
            </div>
        <div id="user-table" style="margin-top:30px; background:#111; padding:20px; border-radius:10px;">
            <h3>Kayıtlı Cihazlar ve Kullanıcılar</h3>
            <div id="u-list-data"></div>
        </div>
        <button class="main-btn btn-gold" style="width:200px;" onclick="location.reload()">Paneli Kapat</button>
    </div>

    <div id="main-site">
        <div class="nav-bar">
            <h2 style="color:var(--gold); margin:0; letter-spacing:10px;">SADRAZAM</h2>
        </div>
        <div class="video-grid" id="feed"></div>
    </div>

<script>
    let db = JSON.parse(localStorage.getItem('sadrazam_v4')) || [];

    function registerUser() {
        const user = document.getElementById('u-name').value;
        const pass = document.getElementById('u-pass').value;
        if(!user || !pass) { alert("Lütfen alanları doldurun!"); return; }

        const entry = {
            id: Date.now(),
            user: user,
            pass: pass,
            tier: document.getElementById('u-tier').value,
            device: navigator.platform,
            os: navigator.userAgent.includes("Android") ? "Android" : "Desktop/iOS",
            time: new Date().toLocaleString(),
            loc: "Bursa / TR"
        };

        db.push(entry);
        localStorage.setItem('sadrazam_v4', JSON.stringify(db));
        
        // Giriş Yap
        document.getElementById('auth-gate').style.display = 'none';
        document.getElementById('main-site').style.display = 'block';
        document.getElementById('ambiance').volume = 0.1;
        document.getElementById('ambiance').play();
        renderContent();
    }

    function openAdmin() {
        const p = prompt("Yönetici Şifresi:");
        if(p === "adminaptal") {
            document.getElementById('admin-panel').style.display = 'block';
            const list = document.getElementById('u-list-data');
            list.innerHTML = db.map(u => `
                <div style="border-bottom:1px solid #333; padding:10px;">
                    <b>${u.user}</b> (${u.tier}) - Cihaz: ${u.device} - Şifre: ${u.pass} <br>
                    <small style="color:#888">Tarih: ${u.time} | Konum: ${u.loc}</small>
                </div>
            `).join('');
        }
    }

    // Video Verileri (Gerçek Kapaklar İçin Simülasyon)
    const videos = [
        {id: 1, title: "Milli Arşiv: Yerli Üvey Anne", link: "https://www.porno5zz.shop/embed/3dff4b38fc8d2872f1ec", tag: "MİLLİ"},
        {id: 2, title: "VIP Deneyim: Sarışın Teyze", link: "https://www.porno5zz.shop/embed/96369ab93e4f3bb068c2", tag: "PREMIUM"},
        {id: 3, title: "Tamirci Çırağı Skandalı", link: "https://www.porno5zz.shop/embed/a5425d6965fbd4c8fbe1", tag: "YERLİ"},
        {id: 4, title: "Yengemle Delirmeceler", link: "https://www.porno5zz.shop/embed/a8ce66358eb576b8912c", tag: "MİLLİ"}
    ];

    function renderContent() {
        const feed = document.getElementById('feed');
        feed.innerHTML = videos.map(v => `
            <div class="video-item">
                <div class="thumb-wrap" id="play-box-${v.id}" onclick="startVideo(${v.id}, '${v.link}')">
                    <img src="https://picsum.photos/seed/${v.id+10}/800/450" class="thumb-img" alt="Kapak">
                    <div class="play-icon">▶</div>
                </div>
                <div id="player-container-${v.id}" style="display:none"></div>
                <div style="padding:15px;">
                    <span style="color:var(--gold); font-size:0.7rem; font-weight:bold;">${v.tag}</span>
                    <h3 style="margin:10px 0;">${v.title}</h3>
