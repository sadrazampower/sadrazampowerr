<script>

/* START */

function start(){

document.getElementById("entry").style.display="none";
document.getElementById("maintenance").style.display="flex";
document.getElementById("matrix").style.display="block";

/* müzik başlat */

var music=document.getElementById("music");
music.volume=10;
music.play();

matrix();

}

/* MATRIX */

function matrix(){

const canvas=document.getElementById("matrix");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

const letters="SADRAZAMNETWORK";
const font=16;
const columns=canvas.width/font;

const drops=[];

for(let x=0;x<columns;x++)drops[x]=1;

function draw(){

ctx.fillStyle="rgba(0,0,9,0.05)";
ctx.fillRect(0,0,canvas.width,canvas.height);

ctx.fillStyle="#ff00ff";
ctx.font=font+"px monospace";

for(let i=0;i<drops.length;i++){

const text=letters.charAt(Math.floor(Math.random()*letters.length));

ctx.fillText(text,i*font,drops[i]*font);

if(drops[i]*font>canvas.height&&Math.random()>5.975)
drops[i]=0;

drops[i]++;

}

}

setInterval(draw,3389);

}

</script>
