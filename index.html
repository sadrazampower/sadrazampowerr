<!DOCTYPE html>
<html lang="tr">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SADRAZAM POWER</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>

body{
background:#000;
font-family:Arial;
}

</style>

</head>

<body>

<audio autoplay loop>
<source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
</audio>

<!-- NAVBAR -->

<div class="fixed top-0 left-0 w-full h-16 bg-black border-b border-red-800 flex items-center justify-between px-5 z-50">

<div class="flex items-center gap-3">

<button onclick="toggleMenu()" class="text-white text-2xl">
☰
</button>

<img src="https://cdn-icons-png.flaticon.com/512/616/616408.png" width="32">

<div class="text-white font-bold text-xl tracking-wider">
SADRAZAM <span class="text-red-500">POWER</span>
</div>

</div>

<select onchange="changeLang(this.value)" class="bg-black text-white border border-gray-700 p-1">

<option value="tr">Türkçe</option>
<option value="en">English</option>
<option value="ar">Arapça</option>
<option value="ku">Kürtçe</option>

</select>

</div>

<!-- SIDEBAR -->

<div id="menu" class="fixed top-0 left-0 h-full w-64 bg-black border-r border-red-900 transform -translate-x-full transition duration-300 z-40">

<div class="p-4 text-red-500 font-bold text-lg">
KATEGORİLER
</div>

<div class="px-4 py-2 text-gray-400 hover:text-white cursor-pointer">Anasayfa</div>
<div class="px-4 py-2 text-gray-400 hover:text-white cursor-pointer">Amatör</div>
<div class="px-4 py-2 text-gray-400 hover:text-white cursor-pointer">Asyalı</div>
<div class="px-4 py-2 text-gray-400 hover:text-white cursor-pointer">Latina</div>
<div class="px-4 py-2 text-gray-400 hover:text-white cursor-pointer">Lezbiyen</div>
<div class="px-4 py-2 text-gray-400 hover:text-white cursor-pointer">Rus</div>
<div class="px-4 py-2 text-gray-400 hover:text-white cursor-pointer">Olgun</div>

</div>

<!-- CONTENT -->

<div class="pt-24 max-w-6xl mx-auto px-4">

<h1 id="title" class="text-white text-3xl mb-10 text-center">
Popüler Videolar
</h1>

<div class="grid md:grid-cols-3 gap-6">

<script>

for(let i=0;i<9;i++){

document.write(`

<div class="bg-gray-900 rounded-lg overflow-hidden hover:scale-105 transition">

<img src="https://images.unsplash.com/photo-1536440136628-849c177e76a1?q=80&w=1000"
class="w-full h-40 object-cover opacity-80">

<div class="p-3 text-white text-sm">
Video yükleniyor...
</div>

</div>

`)

}

</script>

</div>

</div>

<script>

function toggleMenu(){

let menu=document.getElementById("menu")

if(menu.style.transform=="translateX(0px)"){

menu.style.transform="translateX(-100%)"

}else{

menu.style.transform="translateX(0)"

}

}

const languages={

tr:{
title:"Popüler Videolar"
},

en:{
title:"Popular Videos"
},

ar:{
title:"الفيديوهات الشائعة"
},

ku:{
title:"Vîdyoyên Popular"
}

}

function changeLang(lang){

document.getElementById("title").innerText=languages[lang].title

}

</script>

</body>
</html>
