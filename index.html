<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SADRAZAM POWER | 2026 NEXT-GEN</title>
    <style>
        :root {
            --neon-red: #ff0000;
            --neon-gold: #ffd700;
            --dark-bg: #020202;
            --card-bg: #0a0a0a;
            --messi-blue: #0084ff;
        }

        body {
            margin:0; padding:0;
            background-color: var(--dark-bg);
            color: #fff;
            font-family: 'Segoe UI', Roboto, sans-serif;
            overflow-x: hidden;
            background-image: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), 
                              url('https://images.unsplash.com/photo-1574629810360-7efbbe195018?auto=format&fit=crop&q=80&w=1920'); /* Messi/Stadyum Temalı Arka Plan */
            background-attachment: fixed;
            background-size: cover;
        }

        /* Neon Hareketli Başlık */
        header {
            text-align:center;
            padding: 40px 0;
            font-size: 5rem;
            font-weight: 900;
            text-transform: uppercase;
            color: #fff;
            text-shadow: 0 0 10px var(--neon-red), 0 0 30px var(--neon-red);
            animation: moveTitle 5s infinite alternate ease-in-out;
            cursor: pointer;
        }

        @keyframes moveTitle {
            0% { transform: translateX(-20px) skewX(-5deg); text-shadow: 0 0 20px var(--neon-red); }
            100% { transform: translateX(20px) skewX(5deg); text-shadow: 0 0 40px var(--messi-blue); }
        }

        /* Giriş Ekranı */
        #entry-overlay {
            position: fixed;
            top:0; left:0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 10000;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .welcome-box {
            border: 3px solid var(--neon-red);
            padding: 50px;
            text-align: center;
            background: #000;
            box-shadow: 0 0 70px rgba(255, 0, 0, 0.4);
            border-radius: 20px;
            max-width: 500px;
        }

        .messi-avatar {
            width: 150px; height: 150px;
            border-radius: 50%;
            border: 4px solid var(--neon-gold);
            margin-bottom: 20px;
            object-fit: cover;
            box-shadow: 0 0 20px var(--neon-gold);
        }

        .btn {
            padding: 15px 30px;
            margin: 10px;
            font-weight: bold;
            cursor: pointer;
            border: none;
            border-radius: 5px;
            transition: 0.3s;
            text-transform: uppercase;
        }

        .btn-premium { background: var(--neon-red); color: white; box-shadow: 0 0 20px var(--neon-red); }
        .btn-admin { background: #333; color: white; }
        .btn-premium:hover { transform: scale(1.1); filter: brightness(1.2); }

        /* Admin Paneli Gelişmiş */
        #admin-panel {
            display: none;
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 80%; height: 80%;
            background: #111;
            border: 2px solid var(--messi-blue);
            z-index: 10001;
            padding: 30px;
            border-radius: 20px;
            overflow-y: auto;
        }

        .stat-card {
            background: #222;
            padding: 20px;
            border-radius: 10px;
            margin: 10px;
            display: inline-block;
            min-width: 200px;
            border-left: 5px solid var(--neon-red);
        }

        /* Çerez Kutusu (Bisküvi Esprili) */
        #cookie-law {
            position: fixed;
            bottom: 20px; left: 20px;
            background: white; color: black;
            padding: 20px; border-radius: 15px;
            z-index: 9999; display: none;
            width: 300px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* Video Grid */
        .wrapper { display:grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 30px; padding: 50px; }
        .video-card {
            background: var(--card-bg);
            border: 2px solid #222;
            border-radius: 15px;
            overflow: hidden;
            transition: 0.4s;
        }
        .video-card:hover { border-color: var(--neon-red); transform: scale(1.03); box-shadow: 0 0 30px rgba(255,0,0,0.2); }
        .video-frame iframe { width: 100%; height: 200px; border: none; }
        .video-title { padding: 15px; font-weight: bold; font-size: 0.9rem; text-align: center; }

    </style>
</head>
<body>

<iframe id="bg-music" src="https://www.youtube.com/embed/8v_4p9m_lIs?autoplay=1&loop=1" style="display:none"></iframe>

<div id="entry-overlay">
    <div class="welcome-box">
        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcR_6uJt1iK8K5h9rD7G7p_uA9eK8O9k1Y8F1A&s" class="messi-avatar" alt="Messi">
        <h2 id="dynamic-title">SADRAZAM <span style="color:var(--neon-red)">POWER</span></h2>
        <p>2026 VIP Giriş Protokolü Aktif</p>
        <button class="btn btn-premium" onclick="startPremium()">ÜCRETSİZ PREMIUM ERİŞİM</button>
        <button class="btn btn-admin" onclick="openAdmin()">ADMIN GİRİŞİ</button>
    </div>
</div>

<div id="admin-panel">
    <h2 style="color:var(--messi-blue)">SADRAZAM KONTROL MERKEZİ</h2>
    <hr>
    <div id="stats-area">
        <div class="stat-card"><h3>Toplam Giriş</h3><p id="total-hits">1,402</p></div>
        <div class="stat-card"><h3>Anlık Cihaz</h3><p id="device-info">Yükleniyor...</p></div>
        <div class="stat-card"><h3>Konum</h3><p id="location-info">Bursa, TR</p></div>
        <div class="stat-card"><h3>Sunucu Durumu</h3><p style="color:lime">AKTİF</p></div>
    </div>
    <button class="btn btn-premium" onclick="closeAdmin()">PANELİ KAPAT</button>
</div>

<div id="cookie-law">
    <h3>🍪 BİSKÜVİ ŞART!</h3>
    <p>Sitemiz "Çay yanına bisküvi" tadında veriler kullanır. Kabul etmiyorsan çay soğur.</p>
    <button class="btn btn-premium" style="width:100%" onclick="closeCookies()">ÇAYI TAZELE (KABUL ET)</button>
</div>

<header>SADRAZAM POWER</header>

<div class="wrapper" id="video-grid">
    </div>

<script>
    // Video Listesi
    const videos = [
        {embed: 'https://www.porno5zz.shop/embed/c2f636f067f89cc14862', title: 'Üvey Anne Altyazılı VIP'},
        {embed: 'https://www.porno5zz.shop/embed/96369ab93e4f3bb068c2', title: 'Pembe Sarışın Özel'},
        {embed: 'https://www.porno5zz.shop/embed/a5425d6965fbd4c8fbe1', title: 'Tamirci Çırağı Skandalı'},
        {embed: 'https://www.porno5zz.shop/embed/a8ce66358eb576b8912c', title: 'Yenge ile Gizli Anlar'},
        {embed: 'https://www.porno5zz.shop/embed/929b125f8597834fa83a', title: 'İlk Deneyim: Üvey Anne'},
        {embed: 'https://www.porno5zz.shop/embed/3dff4b38fc8d2872f1ec', title: 'Türk Köylü Güzeli'},
        {embed: 'https://www.porno5zz.shop/embed/7f89ddbebc2ac9128303', title: 'Üvey Kardeş Oyunları'},
        {embed: 'https://www.porno5zz.shop/embed/20d2abefe558796b9958', title: 'Ablaya Yakalanma'}
    ];

    const grid = document.getElementById('video-grid');
    videos.forEach(v => {
        grid.innerHTML += `
            <div class="video-card">
                <div class="video-frame">
                    <iframe src="${v.embed}" allowfullscreen></iframe>
                </div>
                <div class="video-title">${v.title}</div>
            </div>`;
    });

    // Premium Başlatma (Geri Sayım)
    function startPremium() {
        let timer = 5;
        const box = document.querySelector('.welcome-box');
        const interval = setInterval(() => {
            box.innerHTML = `<h1 style="font-size:5rem; color:var(--neon-red)">${timer}</h1><p>PREMIUM YÜKLENİYOR...</p>`;
            timer--;
            if(timer < 0) {
                clearInterval(interval);
                document.getElementById('entry-overlay').style.display = 'none';
                document.getElementById('cookie-law').style.display = 'block';
            }
        }, 1000);
    }

    // Admin Panel Fonksiyonları
    function openAdmin() {
        document.getElementById('admin-panel').style.display = 'block';
        document.getElementById('device-info').innerText = navigator.platform + " / " + (navigator.userAgent.includes("Mobile") ? "Mobil" : "Masaüstü");
    }
    
    function closeAdmin() { document.getElementById('admin-panel').style.display = 'none'; }
    function closeCookies() { document.getElementById('cookie-law').style.display = 'none'; }

    // Fake Admin İstatistik Artışı
    setInterval(() => {
        let count = parseInt(document.getElementById('total-hits').innerText.replace(',',''));
        document.getElementById('total-hits').innerText = (count + Math.floor(Math.random()*3)).toLocaleString();
    }, 3000);
</script>

</body>
</html>
