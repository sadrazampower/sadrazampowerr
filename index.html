<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SADRAZAM POWER | ELITE</title>
    <style>
        :root { --neon-green: #00ff41; --neon-pink: #ff00ff; --bg: #000; }
        
        body { 
            margin: 0; padding: 0; background: var(--bg); color: #fff;
            font-family: 'Arial', sans-serif; overflow-x: hidden;
        }

        /* GİRİŞ EKRANI */
        #gate {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 100000; display: flex; align-items: center; justify-content: center;
        }
        .auth-card {
            background: #0a0a0a; padding: 30px; border: 2px solid var(--neon-green);
            border-radius: 20px; text-align: center; width: 85%; max-width: 350px;
        }
        .btn {
            display: block; width: 100%; padding: 15px 0; margin: 10px 0;
            background: transparent; border: 2px solid var(--neon-green);
            color: var(--neon-green); font-weight: bold; cursor: pointer; border-radius: 10px;
        }

        /* ANA SİTE */
        #site { display: none; }
        header { padding: 20px; text-align: center; border-bottom: 1px solid #222; background: #080808; }

        .video-container { padding: 15px; display: flex; flex-direction: column; gap: 30px; align-items: center; }
        .video-box { background: #111; border-radius: 15px; overflow: hidden; width: 100%; max-width: 600px; border: 1px solid #333; }

        /* ÖZEL KAPAK FOTOĞRAFI */
        .v-cover {
            position: relative; width: 100%; aspect-ratio: 16/9;
            background: linear-gradient(45deg, #050505, #151515);
            cursor: pointer; display: flex; align-items: center; justify-content: center; text-align: center;
        }
        .v-cover-text {
            font-size: 1.4rem; font-weight: 900; padding: 20px;
            background: linear-gradient(to right, #00ff41, #00d2ff, #ff00ff);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            text-shadow: 0 0 10px rgba(0,255,65,0.5);
            text-transform: uppercase;
        }
        .play-btn {
            position: absolute; bottom: 10px; right: 10px;
            background: var(--neon-green); color: #000; padding: 5px 15px;
            border-radius: 5px; font-weight: bold; font-size: 0.8rem;
        }

        /* ADMİN PANEL */
        #admin-panel {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 100001; padding: 20px; color: var(--neon-green); font-family: monospace;
        }
    </style>
</head>
<body>

    <div id="gate">
        <div class="auth-card">
            <h1 style="color:var(--neon-green); letter-spacing:3px;">SADRAZAM</h1>
            <button class="btn" onclick="openSite()">MİSAFİR GİRİŞİ</button>
            <button class="btn" style="border-color:#444; color:#555;" onclick="openAdmin()">ADMİN PANEL</button>
        </div>
    </div>

    <div id="admin-panel">
        <h2>SADRAZAM CONTROL CENTER</h2>
        <div id="logs" style="margin:20px 0; border:1px solid #222; padding:10px; height:70%; overflow-y:auto;"></div>
        <button class="btn" onclick="location.reload()">KAPAT</button>
    </div>

    <div id="site">
        <header><h2 style="color:var(--neon-green); margin:0;">SADRAZAM POWER</h2></header>
        <div class="video-container" id="feed"></div>
    </div>

<script>
    // Gerçek EBA (Embed) Kodları
    const videos = [
        {id: 1, title: "Milli Arşiv - Yerli Gizli", src: "https://www.porno5zz.shop/embed/3dff4b38fc8d2872f1ec"},
        {id: 2, title: "Üvey Anne Altyazılı", src: "https://www.porno5zz.shop/embed/c2f636f067f89cc14862"},
        {id: 3, title: "Komşu Kızı İntikam", src: "https://www.porno5zz.shop/embed/96369ab93e4f3bb068c2"},
        {id: 4, title: "Tamirci ve Ev Sahibi", src: "https://www.porno5zz.shop/embed/a5425d6965fbd4c8fbe1"},
        {id: 5, title: "Aşiret Yengesi Yasak", src: "https://www.porno5zz.shop/embed/a8ce66358eb576b8912c"}
    ];

    function openSite() {
        saveLog("Misafir Girişi");
        document.getElementById('gate').style.display = 'none';
        document.getElementById('site').style.display = 'block';
        renderContent();
    }

    function openAdmin() {
        const p = prompt("ADMİN ŞİFRE:");
        if(p === "adminaptal") {
            document.getElementById('admin-panel').style.display = 'block';
            const history = JSON.parse(localStorage.getItem('sd_history')) || [];
            document.getElementById('logs').innerHTML = history.reverse().map(h => 
                `<div>> [${h.t}] ${h.a} | Cihaz: ${h.d}</div>`
            ).join('');
        }
    }

    function renderContent() {
        const feed = document.getElementById('feed');
        feed.innerHTML = videos.map(v => `
            <div class="video-box">
                <div class="v-cover" onclick="loadVideo(this, '${v.src}')">
                    <div class="v-cover-text">EN İYİ PORNO SİTESİ<br>SADRAZAM POWER</div>
                    <div class="play-btn">VİDEOYU OYNAT ▶</div>
                </div>
                <div style="padding:15px; border-top:1px solid #222;">
                    <b style="color:var(--neon-green)">${v.title}</b>
                </div>
                <div style="padding:15px; background:#080808;">
                    <div id="c-list-${v.id}" style="font-size:0.8rem; color:#666; margin-bottom:10px;">
                        <div><b>Misafir:</b> Efsane video knk!</div>
                    </div>
                    <input type="text" id="in-${v.id}" placeholder="Yorum yaz..." style="width:70%; background:#000; border:1px solid #333; color:#fff; padding:5px;">
                    <button onclick="addC(${v.id})" style="background:var(--neon-green); border:none; padding:5px 10px; font-weight:bold; cursor:pointer;">GÖNDER</button>
                </div>
            </div>
        `).join('');
    }

    // VİDEOYU ÇALIŞTIRAN ASIL FONKSİYON
    function loadVideo(element, src) {
        element.innerHTML = `<iframe src="${src}" style="width:100%; height:100%; border:none;" allowfullscreen></iframe>`;
        element.onclick = null; // Tekrar tıklanmasın
    }

    function addC(id) {
        const val = document.getElementById(`in-${id}`).value;
        if(!val) return;
        const div = document.createElement('div');
        div.innerHTML = `<b>Misafir:</b> ${val}`;
        document.getElementById(`list-${id}`).prepend(div);
        document.getElementById(`in-${id}`).value = "";
    }

    function saveLog(type) {
        let history = JSON.parse(localStorage.getItem('sd_history')) || [];
        history.push({
            t: new Date().toLocaleString(),
            a: type,
            d: navigator.userAgent.includes("Android") ? "Android" : "PC/iOS"
        });
        localStorage.setItem('sd_history', JSON.stringify(history));
    }
</script>
</body>
</html>
