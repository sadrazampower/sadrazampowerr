<!DOCTYPE html>
<html lang="tr">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>SADRAZAM POWER</title>

<style>

body{
margin:0;
font-family:Arial;
background:#050505;
color:white;
}

/* LOGO */

.logo{
font-size:40px;
font-weight:bold;
text-align:center;
padding:20px;

color:white;

text-shadow:
0 0 5px #fff,
0 0 10px #ff0000,
0 0 20px #ff0000,
0 0 40px #ff0000;

animation:flicker 1.5s infinite alternate;
}

@keyframes flicker{

0%{opacity:1}
50%{opacity:0.8}
100%{opacity:1}

}

/* LAYOUT */

.container{
display:flex;
}

.sidebar{

width:250px;
background:#0b0b0b;
padding:20px;
height:100vh;
overflow:auto;

}

.sidebar button{

display:block;
width:100%;
margin-bottom:8px;
background:#111;
color:#aaa;
border:1px solid #222;
padding:10px;
cursor:pointer;

}

.sidebar button:hover{

border:1px solid red;
color:white;

}

/* VIDEOS */

.content{

flex:1;
padding:30px;

}

.grid{

display:grid;

grid-template-columns:repeat(auto-fit,minmax(300px,1fr));

gap:25px;

}

.card{

background:#111;
border-radius:10px;
overflow:hidden;
border:1px solid #222;

}

.card iframe{

width:100%;
height:200px;
border:none;

}

.card h3{

padding:10px;
font-size:16px;

}

/* COOKIE */

.cookie{

position:fixed;
bottom:0;
width:100%;
background:#111;
padding:15px;
text-align:center;
display:none;

}

.cookie button{

margin:5px;
padding:10px 15px;
border:none;
cursor:pointer;

}

.accept{

background:red;
color:white;

}

.reject{

background:#333;
color:white;

}

/* OVERLAY */

.overlay{

position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;

display:flex;
justify-content:center;
align-items:center;

flex-direction:column;

z-index:999;

}

.overlay button{

padding:15px 30px;
margin:10px;
border:none;
cursor:pointer;
font-size:16px;

}

.enter{

background:red;
color:white;

}

.premium{

background:gold;

}

@media(max-width:900px){

.container{

flex-direction:column;

}

.sidebar{

width:100%;
height:auto;

}

}

</style>

</head>

<body>

<audio id="music" loop>
<source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-8.mp3">
</audio>

<!-- GİRİŞ -->

<div class="overlay" id="entry">

<div class="logo">SADRAZAM POWER</div>

<p>Devam etmek için giriş yap</p>

<button class="enter" onclick="enterSite()">Ücretsiz Giriş</button>

<button class="premium" onclick="premium()">👑 Premium</button>

</div>

<!-- LOGO -->

<div class="logo">SADRAZAM POWER</div>

<div class="container">

<!-- SIDEBAR -->

<div class="sidebar">

<h3>Kategoriler</h3>

<button onclick="coming()">Türk</button>
<button onclick="coming()">HD</button>
<button onclick="coming()">4K</button>
<button onclick="coming()">Amatör</button>
<button onclick="coming()">MILF</button>
<button onclick="coming()">Anal</button>
<button onclick="coming()">Grup</button>
<button onclick="coming()">Lezbiyen</button>

</div>

<!-- CONTENT -->

<div class="content">

<div class="grid">

<div class="card">

<iframe src=""></iframe>

<h3>Video 1</h3>

</div>

<div class="card">

<iframe src=""></iframe>

<h3>Video 2</h3>

</div>

<div class="card">

<iframe src=""></iframe>

<h3>Video 3</h3>

</div>

</div>

</div>

</div>

<!-- COOKIE -->

<div class="cookie" id="cookie">

Bu site çerez kullanır.

<button class="accept" onclick="acceptCookie()">Kabul Ediyorum</button>

<button class="reject" onclick="rejectCookie()">Reddet</button>

</div>

<script>

const music=document.getElementById("music")

function enterSite(){

document.getElementById("entry").style.display="none"

music.play()

document.getElementById("cookie").style.display="block"

}

function premium(){

alert("👑 Premium üyelik yakında aktif olacak")

}

function acceptCookie(){

document.getElementById("cookie").style.display="none"

}

function rejectCookie(){

document.body.innerHTML="<h1 style='text-align:center;margin-top:200px'>İyi günler ☀️<br>Bu siteyi kullanabilmek için çerezleri kabul etmeniz gerekir.</h1>"

}

function coming(){

alert("🚧 Bu kategori yakında aktif olacak")

}

</script>

</body>
</html>
