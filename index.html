<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SADRAZAM POWER | Premium</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        body {
            background-color: #050505;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow-x: hidden;
        }

        /* Neon Glow Efekti */
        .neon-text {
            text-shadow: 0 0 10px #ff0000, 0 0 20px #ff0000, 0 0 30px #ff0000;
        }

        /* Video Kartları Hover */
        .video-card:hover {
            border-color: #ff0000;
            box-shadow: 0 0 15px rgba(255, 0, 0, 0.4);
        }

        /* Güncelleniyor Overlay */
        #update-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.95);
            z-index: 999;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .loader {
            border: 4px solid #1a1a1a;
            border-top: 4px solid #ff0000;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

<audio id="bgMusic" loop>
    <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-15.mp3" type="audio/mpeg">
</audio>

<nav class="fixed top-0 w-full h-16 bg-black/90 border-b border-red-900 flex items-center justify-between px-6 z-50 backdrop-blur-md">
    <div class="flex items-center gap-4">
        <button onclick="toggleMenu()" class="text-red-600 hover:text-white transition">
            <i class="fas fa-bars text-2xl"></i>
        </button>
        <div class="text-2xl font-black tracking-tighter">
            SADRAZAM <span class="text-red-600 neon-text">POWER</span>
        </div>
    </div>
    
    <div class="flex items-center gap-4">
        <select onchange="changeLang(this.value)" class="bg-zinc-900 text-xs border border-red-900 rounded p-1 outline-none">
            <option value="tr">TR</option>
            <option value="en">EN</option>
        </select>
        <i class="fas fa-user-circle text-2xl text-red-600"></i>
    </div>
</nav>

<div id="menu" class="fixed top-0 left-0 h-full w-72 bg-zinc-950 border-r border-red-900 transform -translate-x-full transition-transform duration-500 z-40 pt-20">
    <div class="p-6">
        <h3 class="text-red-600 font-bold mb-4 uppercase tracking-widest text-sm border-b border-red-900/30 pb-2">Kategoriler</h3>
        <ul class="space-y-2">
            <li onclick="showUpdateMsg()" class="p-3 hover:bg-red-900/20 rounded cursor-pointer transition text-gray-300 hover:text-white"><i class="fas fa-fire mr-2"></i> Popüler</li>
            <li onclick="showUpdateMsg()" class="p-3 hover:bg-red-900/20 rounded cursor-pointer transition text-gray-300 hover:text-white"><i class="fas fa-star mr-2"></i> Amatör</li>
            <li onclick="showUpdateMsg()" class="p-3 hover:bg-red-900/20 rounded cursor-pointer transition text-gray-300 hover:text-white"><i class="fas fa-globe mr-2"></i> Global</li>
            <li onclick="showUpdateMsg()" class="p-3 hover:bg-red-900/20 rounded cursor-pointer transition text-gray-300 hover:text-white"><i class="fas fa-clock mr-2"></i> Yeni Eklenenler</li>
        </ul>
    </div>
</div>

<main class="pt-24 px-4 max-w-7xl mx-auto">
    <h2 id="page-title" class="text-xl font-bold mb-8 border-l-4 border-red-600 pl-4 uppercase tracking-widest">
        Trend Videolar
    </h2>

    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8">
        <script>
            const videos = [1,2,3,4,5,6];
            videos.forEach(v => {
                document.write(`
                    <div onclick="showUpdateMsg()" class="video-card bg-zinc-900 rounded-xl overflow-hidden cursor-pointer border border-zinc-800 transition-all duration-300 group">
                        <div class="relative overflow-hidden">
                            <img src="https://source.unsplash.com/random/400x225?dark,tech&sig=${v}" class="w-full h-48 object-cover group-hover:scale-110 transition duration-500">
                            <div class="absolute inset-0 bg-black/40 flex items-center justify-center opacity-0 group-hover:opacity-100 transition">
                                <i class="fas fa-play-circle text-5xl text-red-600"></i>
                            </div>
                        </div>
                        <div class="p-4">
                            <div class="h-4 w-3/4 bg-zinc-800 rounded mb-2"></div>
                            <div class="h-3 w-1/2 bg-zinc-800/50 rounded"></div>
                        </div>
                    </div>
                `);
            });
        </script>
    </div>
</main>

<div id="update-overlay">
    <div class="loader mb-6"></div>
    <h2 class="text-red-600 text-3xl font-bold neon-text mb-2 uppercase">Sistem Güncelleniyor</h2>
    <p class="text-gray-400 tracking-widest text-sm animate-pulse">Lütfen bekleyin, ana sayfaya yönlendiriliyorsunuz...</p>
</div>

<script>
    // Menü Aç/Kapat
    function toggleMenu() {
        const menu = document.getElementById("menu");
        menu.classList.toggle("-translate-x-full");
    }

    // Müzik Başlatma (İlk tıklamada çalışır)
    document.body.addEventListener('click', function() {
        const music = document.getElementById("bgMusic");
        if (music.paused) music.play();
    }, { once: true });

    // Güncelleme Uyarısı ve Yönlendirme
    function showUpdateMsg() {
        const overlay = document.getElementById("update-overlay");
        overlay.style.display = "flex";
        
        // 3 saniye sonra ekranı kapat (Yönlendirme simülasyonu)
        setTimeout(() => {
            overlay.style.display = "none";
            // Eğer sidebar açıksa kapat
            document.getElementById("menu").classList.add("-translate-x-full");
        }, 3000);
    }

    function changeLang(lang) {
        const titles = { tr: "Trend Videolar", en: "Trending Videos" };
        document.getElementById("page-title").innerText = titles[lang] || titles['tr'];
    }
</script>

</body>
</html>
