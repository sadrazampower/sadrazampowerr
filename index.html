<!DOCTYPE html>
<html lang="ru">
<head>

    <title>SYSTEM_CRITICAL_ERROR</title>
    <style>
        body { 
            background: black; 
            color: #ff0000; 
            font-family: 'Courier New', monospace; 
            overflow: hidden; 
            margin: 0; 
            cursor: crosshair;
        }
        .error-msg { 
            position: absolute; 
            font-weight: bold; 
            pointer-events: none; 
            white-space: nowrap;
            text-shadow: 0 0 8px #ff0000;
            opacity: 0.9;
        }
        #warning {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 1000;
            text-align: center;
            border: 5px solid red;
            padding: 50px;
            background: rgba(0,0,0,0.9);
            box-shadow: 0 0 50px red;
        }
        .glitch { animation: shake 0.1s infinite; }
        @keyframes shake {
            0% { transform: translate(2px, 2px); }
            50% { transform: translate(-2px, -2px); }
            100% { transform: translate(1px, -1px); }
        }
    </style>
</head>
